name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            output: git-time-linux-amd64
          - name: linux-arm64
            goos: linux
            goarch: arm64
            output: git-time-linux-arm64
          - name: windows-amd64
            goos: windows
            goarch: amd64
            output: git-time-windows-amd64.exe
          - name: windows-arm64
            goos: windows
            goarch: arm64
            output: git-time-windows-arm64.exe
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            output: git-time-macos-arm64
          - name: macos-amd64
            goos: darwin
            goarch: amd64
            output: git-time-macos-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.output }} ./cmd/git-time

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
